<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoneCycling – Reset password</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0;
           min-height: 100vh; display: grid; place-items: center;
           background: #f4f6f8; color: #1f2933; }
    .card { background: #fff; padding: 2.5rem; border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,.08); max-width: 420px; width: 90%; }
    h1 { margin: 0 0 .75rem; font-size: 1.4rem; text-align: center; }
    p { color: #52606d; line-height: 1.5; }
    label { display: block; font-size: .85rem; margin: .9rem 0 .25rem; }
    input[type=password] { width: 100%; box-sizing: border-box; padding: .55rem .7rem;
           border: 1px solid #cbd2d9; border-radius: 8px; font-size: 1rem; }
    .err { color: #c0392b; font-size: .85rem; margin-top: .6rem; }
    .btn { display: inline-block; width: 100%; box-sizing: border-box; margin-top: 1.25rem;
           padding: .6rem 1.2rem; background: #0d6efd; color: #fff; border: 0; cursor: pointer;
           text-decoration: none; text-align: center; border-radius: 8px; font-weight: 600; font-size: 1rem; }
    @media (prefers-color-scheme: dark) {
      body { background: #14181c; color: #e4e7eb; }
      .card { background: #1f242a; box-shadow: none; }
      p, label { color: #9aa5b1; }
      input[type=password] { background: #14181c; color: #e4e7eb; border-color: #3e4c59; }
    }
  </style>
</head>
<body>
  <div class="card">
    {% if valid %}
      <h1>🔑 New password</h1>
      <p>Choose a new password for your GoneCycling profile.</p>
      <form method="post">
        {% csrf_token %}
        <label for="password">New password</label>
        <input id="password" type="password" name="password" autocomplete="new-password" required>
        <label for="password2">Confirm password</label>
        <input id="password2" type="password" name="password2" autocomplete="new-password" required>
        {% if error %}<div class="err">{{ error }}</div>{% endif %}
        <button class="btn" type="submit">Set password</button>
      </form>
    {% else %}
      <h1>⚠️ Invalid link</h1>
      <p>This reset link is invalid or has expired. Request a new link in the
         app via “Forgot password?”.</p>
      <a class="btn" href="{{ base_path }}/?login=1">Open the app</a>
    {% endif %}
  </div>
</body>
</html>
