# nginx reverse proxy for the GoneCycling web app under /gonecycling
# ===================================================================
# Insert these two location blocks into the EXISTING `server { … }` block of
# example.com (where `location /ors { … }` lives too) and reload nginx:
#   sudo nginx -t && sudo systemctl reload nginx
#
# The proxy passes the full path INCLUDING the prefix (no stripping): Django
# routes under /gonecycling itself (GC_BASE_PATH), and the static files live
# under /gonecycling/static/. Therefore use proxy_pass WITHOUT an appended
# path/slash.

# /gonecycling without slash → redirect to /gonecycling/.
location = /gonecycling {
    return 301 /gonecycling/;
}

location /gonecycling/ {
    # Target = the locally bound container (docker-compose.prod.yml, GC_PORT).
    proxy_pass http://127.0.0.1:8071;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    # Important: signals HTTPS to Django (SECURE_PROXY_SSL_HEADER).
    proxy_set_header X-Forwarded-Proto $scheme;

    # Encrypted sync blobs can grow larger (default limit 8 MB,
    # Base64 +~33 %). 16m leaves enough headroom.
    client_max_body_size 16m;
    proxy_read_timeout 60s;
}
