# Apache reverse proxy for the GoneCycling web app under /gonecycling
# ===================================================================
# example.com runs on APACHE (not nginx). Insert these directives into the
# <VirtualHost *:443> block of example.com — where the /ors proxy lives too.
#
# Modules (enable once):
#   sudo a2enmod proxy proxy_http headers
# Apply:
#   sudo apachectl configtest && sudo systemctl reload apache2
#
# IMPORTANT — Host header: Django checks DJANGO_ALLOWED_HOSTS. By default
# Apache passes the backend host (127.0.0.1) through, so add it in the .env:
#   DJANGO_ALLOWED_HOSTS=example.com,127.0.0.1,localhost
# then restart the container. (Alternatively set "ProxyPreserveHost On"
# globally, if not already active for /ors anyway.)
#
# The port (8071) must match GC_PORT from the .env / docker-compose.prod.yml.

# /gonecycling without trailing slash -> redirect to /gonecycling/.
RedirectMatch 301 ^/gonecycling$ /gonecycling/

<Location /gonecycling/>
    # Pass the full path INCL. prefix to the container (no stripping):
    # Django routes under /gonecycling itself, static lives under /gonecycling/static/.
    ProxyPass        http://127.0.0.1:8071/gonecycling/ retry=0
    ProxyPassReverse http://127.0.0.1:8071/gonecycling/

    # Signal to Django that HTTPS is terminated outside (SECURE_PROXY_SSL_HEADER).
    RequestHeader set X-Forwarded-Proto "https"

    # Encrypted sync blobs can be larger (default limit 8 MB, Base64 +~33 %).
    LimitRequestBody 16777216
</Location>
